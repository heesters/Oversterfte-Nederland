name: manual Python package
on:
  workflow_dispatch
jobs:
  build:
    runs-on: macos-latest
    strategy:
      matrix:
        python-version: [3.14]
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas requests seaborn matplotlib

      - name: execute py script
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 120
          command: python Overledenen.py

      - name: Update graphs
        run: |
          git config --global user.name 'heesters'
          git config --global user.email 'heesters@users.noreply.github.com'
          git add -A
          git commit -m "Update graphs" || echo "Nothing to commit"
          git push
